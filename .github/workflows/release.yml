name: Release

on:
  push:
    tags:
      # Manifest-as-source-of-truth: the `<version>` between `v` and
      # end-of-tag must match `__version__` in
      # src/viur/light_mock/__init__.py exactly.
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # pre-release tags like v1.0.0-rc1

permissions:
  contents: read

jobs:
  # ----- Gate 1: full test matrix must pass with 100% coverage --------------
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Tests with 100% coverage gate
        run: |
          coverage run -m pytest
          coverage report --fail-under=100

  # ----- Verify the tag matches __version__ ---------------------------------
  version-check:
    name: Tag vs. __version__
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compare
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import re; t=open('src/viur/light_mock/__init__.py').read(); print(re.search(r'__version__ = [\"\\'']([^\"\\'']+)[\"\\'']', t).group(1))")
          echo "Tag version:     $TAG"
          echo "Package version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ($TAG) does not match __version__ ($PKG). Manifest is the single source of truth — bump src/viur/light_mock/__init__.py before tagging."
            exit 1
          fi

  # ----- Build wheel + sdist ------------------------------------------------
  build:
    name: Build Python distribution
    needs: [test, version-check]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  # ----- Publish to PyPI via OIDC Trusted Publishing ------------------------
  #
  # Setup on the PyPI side (one-time, per project):
  #   PyPI project (`spltz-viur-light-mock`) → Publishing → Add a publisher
  #   - Owner:           sprengplatz
  #   - Repository:      viur-light-mock
  #   - Workflow:        release.yml
  #   - Environment:     pypi
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/spltz-viur-light-mock
    permissions:
      id-token: write   # OIDC trusted publishing

    steps:
      - name: Download Python dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  # ----- Cut GitHub Release with wheel + sdist attached ---------------------
  release:
    name: Create GitHub Release
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Python dist
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Determine pre-release flag
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.value }}
          files: |
            dist/*.whl
            dist/*.tar.gz
